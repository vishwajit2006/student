<div class="auth-container">
  <div class="auth-card saas-card fade-in">
    <div class="auth-brand-panel">
      <h1>Student Task Manager</h1>
      <p>Stay on top of your assignments — always.</p>
    </div>

    <div class="auth-header">
      <h2>Create Account</h2>
    </div>

    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" class="auth-form">
      <div class="form-group">
        <label for="email">Email Address</label>
        <input 
          type="email" 
          id="email" 
          formControlName="email" 
          placeholder="student@example.com"
          [class.invalid]="registerForm.get('email')?.invalid && registerForm.get('email')?.touched"
        />
        <small class="error-text" *ngIf="registerForm.get('email')?.invalid && registerForm.get('email')?.touched">
          Valid email is required
        </small>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input 
          type="password" 
          id="password" 
          formControlName="password" 
          placeholder="Min 6 characters"
          [class.invalid]="registerForm.get('password')?.invalid && registerForm.get('password')?.touched"
        />
        <small class="error-text" *ngIf="registerForm.get('password')?.errors?.['required'] && registerForm.get('password')?.touched">
          Password is required
        </small>
        <small class="error-text" *ngIf="registerForm.get('password')?.errors?.['minlength'] && registerForm.get('password')?.touched">
          Password must be at least 6 characters
        </small>
      </div>

      <div class="alert alert-error" *ngIf="error">
        {{ error }}
      </div>

      <button type="submit" class="btn btn-primary btn-block" [disabled]="registerForm.invalid || loading" style="margin-top: 1rem;">
        <span *ngIf="!loading">Create Account</span>
        <span *ngIf="loading" class="spinner"></span>
      </button>
    </form>

    <div class="auth-footer">
      <p>Already have an account? <a routerLink="/login">Log in here</a></p>
    </div>
  </div>
</div>
