<div class="dashboard-content fade-in">
  <div class="dashboard-header-inner">
    <h2>Dashboard Overview</h2>
    <button class="btn btn-primary" (click)="openModal()">
      <i class="fa-solid fa-plus" style="margin-right: 0.5rem;"></i> New Task
    </button>
  </div>

  <!-- Stats Bar -->
  <div class="stats-bar">
    <div class="stat-card">
      <span class="stat-label">Total Tasks</span>
      <span class="stat-value">{{ totalTasks }}</span>
    </div>
    <div class="stat-card stat-pending">
      <span class="stat-label">Pending</span>
      <span class="stat-value">{{ pendingTasks }}</span>
    </div>
    <div class="stat-card stat-completed">
      <span class="stat-label">Completed</span>
      <span class="stat-value">{{ completedTasks }}</span>
    </div>
    <div class="stat-card stat-overdue">
      <span class="stat-label">Overdue</span>
      <span class="stat-value">{{ overdueTasks }}</span>
    </div>
  </div>

  <section class="list-section">
    <div class="filters">
      <h3>Recent Tasks</h3>
      <div class="filter-controls">
        <div class="search-wrapper">
          <i class="fa-solid fa-magnifying-glass search-icon"></i>
          <input type="text" class="search-input" placeholder="Search tasks..." [(ngModel)]="searchTerm">
        </div>

        <select [(ngModel)]="filterStatus" (change)="onFilterChange()">
          <option value="">All Statuses</option>
          <option value="pending">Pending</option>
          <option value="completed">Completed</option>
        </select>
        
        <select [(ngModel)]="filterPriority" (change)="onFilterChange()">
          <option value="">All Priorities</option>
          <option value="low">Low</option>
          <option value="medium">Medium</option>
          <option value="high">High</option>
        </select>
      </div>
    </div>

    <div *ngIf="isLoading" class="loading-state">
      <div class="skeleton skeleton-card"></div>
      <div class="skeleton skeleton-card" style="margin-top: 0.75rem;"></div>
      <div class="skeleton skeleton-card" style="margin-top: 0.75rem;"></div>
    </div>

    <app-task-list 
      *ngIf="!isLoading"
      [tasks]="filteredTasks" 
      (taskToggle)="onTaskToggle($event)"
      (taskEdit)="onTaskEdit($event)"
      (taskDelete)="onTaskDelete($event)">
    </app-task-list>
  </section>

  <!-- Modal for Task Form -->
  <div
    class="modal-overlay"
    *ngIf="showModal"
    (click)="closeModal()"
    role="dialog"
    aria-modal="true"
    aria-labelledby="modal-title">
    <div class="modal-content" (click)="$event.stopPropagation()">
      <app-task-form
        [task]="editingTask"
        (taskSubmit)="onTaskSubmit($event)"
        (cancel)="closeModal()">
      </app-task-form>
    </div>
  </div>

  <!-- Toast Notification -->
  <div
    class="toast-container"
    *ngIf="toastMessage"
    role="status"
    aria-live="polite"
    aria-atomic="true">
    <div class="toast" [ngClass]="toastType === 'success' ? 'toast-success' : 'toast-error'">
      <i class="toast-icon fa-solid" [ngClass]="toastType === 'success' ? 'fa-check' : 'fa-xmark'" aria-hidden="true"></i>
      <span class="toast-message">{{ toastMessage }}</span>
    </div>
  </div>
</div>
